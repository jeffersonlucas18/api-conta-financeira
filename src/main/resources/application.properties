spring.application.name=controle-financeiro
spring.datasource.url=jdbc:h2:mem:financeiro
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=user
spring.datasource.password=pass
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.sql.init.data-locations=classpath:querys.sql
spring.jpa.defer-datasource-initialization=true
spring.web.error.include-binding-errors=always
spring.web.error.include-message=never

